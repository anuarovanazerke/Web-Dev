<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Instagram Login</title>
        <link rel="icon" type="image/x-icon" href="favicon-2.ico">
        <link rel="stylesheet" href="styleinst.css">
    </head>
<body>
    <main class="container">
        <section class="left">
        <h1>See everyday moments from your</h1>
        <h1 class="rainbow">close friends.</h1>
        <img src="https://static.cdninstagram.com/rsrc.php/v4/yF/r/reN9rvYdLTB.png" alt="Instagram  mockup">
        </section>
    
          <section class="right">
            <form class="log">
                    <h3>Log in to Instagram</h3>
                    <input type="text" id="email" name="email" placeholder="Mobile number,username or email address">
                    <input type="password" id="password" name="password"placeholder="Password">
                    <button type="submit">Log in</button>
            </form>
                <a href="#" class="forgot-pass">Forgot password?</a>
                <a href="#" class="fblog">Log in with Facebook</a>
                <a href="#" class="create-acc">Create new account</a>
            </section>
    </main>
</body>
</html>
