<div class="product-card">
  <a [href]="product().link" target="_blank">
      <img [src]="product().image" [alt]="product().name" class="main-image">
  </a>
  
  <div class="product-info">
      <h3>{{product().name}}</h3>
      <p class="description">{{product().description}}</p>
      <p class="price">{{product().price | number}} ₸</p>
      <p class="rating">⭐ {{product().rating}} | ❤️ {{product().likes}}</p>
  </div>

  <div class="actions">
      <button class="btn-like" (click)="like()">Like</button>
      <button class="btn-delete" (click)="remove()">Delete</button>
  </div>

  <div class="share-button">
      <a [href]="getWhatsAppLink()" target="_blank">WhatsApp</a>
      <span class="divider">|</span>
      <a [href]="getTelegramLink()" target="_blank">Telegram</a>
  </div> 
</div>
